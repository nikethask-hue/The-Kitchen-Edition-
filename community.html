<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Kitchen Edition | Community</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: light; --bg:#f5f2e8; --surface:#fff; --text:#171716; --muted:#66655f; --border:rgba(23,23,22,0.16); }
    @media (prefers-color-scheme: dark){ :root{ color-scheme:dark; --bg:#121212; --surface:#1a1a1a; --text:#f2efe9; --muted:#b6b2a8; --border:rgba(242,239,233,0.16);} }
    *{box-sizing:border-box;} body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);} a{color:inherit;text-decoration:none;} .page{max-width:900px;margin:0 auto;padding:28px 20px 48px;} .back-link{display:inline-block;margin-bottom:18px;font-size:12px;color:var(--muted);} .masthead{border-top:1.5px solid var(--text);border-bottom:0.5px solid var(--border);padding:20px 0 16px;} .eyebrow{margin:0 0 8px;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);} h1{margin:0 0 8px;font-family:'Playfair Display',serif;font-size:32px;font-weight:500;} .subhead{margin:0;font-size:13px;font-weight:300;color:var(--muted);} .feed{display:grid;gap:16px;margin-top:24px;} .post-card{border:0.5px solid var(--border);border-radius:12px;background:var(--surface);padding:16px;} .post-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;} .post-user{display:flex;align-items:center;gap:8px;} .avatar{width:32px;height:32px;border-radius:50%;background:#e7e5dc;display:grid;place-items:center;overflow:hidden;font-size:12px;font-weight:600;} .avatar img{width:100%;height:100%;object-fit:cover;} .post-meta{font-size:11px;color:var(--muted);} .post-recipe{font-family:'Playfair Display',serif;font-size:16px;margin:8px 0 6px;} .post-caption{font-size:14px;line-height:1.5;margin:0 0 10px;} .post-image{width:100%;height:auto;border-radius:8px;border:0.5px solid var(--border);margin-bottom:10px;} .post-actions{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12px;color:var(--muted);} .like-btn{background:none;border:none;cursor:pointer;color:inherit;font:inherit;padding:0;} .tag{display:inline-flex;padding:4px 8px;border-radius:999px;background:rgba(47,95,130,0.12);color:#2f5f82;font-size:11px;} .load-more{margin-top:16px;border:0.5px solid var(--border);border-radius:999px;background:var(--surface);padding:10px 14px;font:inherit;cursor:pointer;} .empty{padding:20px 0;color:var(--muted);} @media (max-width: 480px){ .page{padding:18px 14px 36px;} h1{font-size:28px;} }
  </style>
</head>
<body>
  <div class="page">
    <a class="back-link" href="index.html">← Back to app</a>
    <header class="masthead">
      <p class="eyebrow">The Kitchen Edition — Community</p>
      <h1>From our kitchen to yours</h1>
      <p class="subhead">Dishes made by members of The Kitchen Edition.</p>
    </header>
    <div id="feed" class="feed"></div>
    <button id="loadMoreBtn" class="load-more" style="display:none;">Load more</button>
  </div>

  <div id="authModal" class="auth-modal-overlay" aria-hidden="true" style="position:fixed; inset:0; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; padding:20px; z-index:3000;">
    <div class="auth-modal-card" role="dialog" aria-modal="true" style="width:min(100%, 420px); background:#fff; border-radius:12px; border:0.5px solid rgba(17,17,17,0.16); padding:24px;">
      <h2 style="margin:0 0 8px; font-family:'Playfair Display', serif; font-size:24px; font-weight:500;">Welcome to The Kitchen Edition</h2>
      <p style="margin:0 0 16px; font-size:13px; color:#666;">Sign in to see the community feed and share what you made.</p>
      <div id="authMessage" style="font-size:12px; margin-bottom:12px; color:#2f5f82;"></div>
      <div class="auth-form-grid" style="display:grid; gap:12px;">
        <input id="signinEmail" type="email" placeholder="Email" style="padding:10px 12px; border:0.5px solid rgba(17,17,17,0.16); border-radius:10px; font:inherit;" />
        <input id="signinPassword" type="password" placeholder="Password" style="padding:10px 12px; border:0.5px solid rgba(17,17,17,0.16); border-radius:10px; font:inherit;" />
        <button id="signinBtn" class="auth-action-btn" style="border:none; border-radius:999px; padding:9px 14px; background:#111; color:#fff; font:inherit; cursor:pointer;">Sign in</button>
        <button id="googleSignInBtn" class="google-btn" style="border:0.5px solid rgba(17,17,17,0.16); border-radius:999px; padding:9px 14px; background:#fff; color:#171716; font:inherit; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:8px;">Continue with Google</button>
      </div>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-storage-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: 'AIzaSyA5xjQkdJdV0x5S0q3gOm2WQ0C0S2u9W4I',
      authDomain: 'the-kitchen-edition-7cb7a.firebaseapp.com',
      projectId: 'the-kitchen-edition-7cb7a',
      storageBucket: 'the-kitchen-edition-7cb7a.firebasestorage.app',
      messagingSenderId: '825295658456',
      appId: '1:825295658456:web:70d2af0ca0f751d0f2b06d8'
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const feedEl = document.getElementById('feed');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    let lastDoc = null;
    let hasMore = true;
    let currentUser = null;
    function showAuthModal() {
      const modal = document.getElementById('authModal');
      if (modal) {
        modal.style.display = 'flex';
        modal.setAttribute('aria-hidden', 'false');
      }
    }
    function hideAuthModal() {
      const modal = document.getElementById('authModal');
      if (modal) {
        modal.style.display = 'none';
        modal.setAttribute('aria-hidden', 'true');
      }
    }
    async function handleEmailSignIn() {
      try {
        await auth.signInWithEmailAndPassword(document.getElementById('signinEmail').value, document.getElementById('signinPassword').value);
        hideAuthModal();
      } catch (err) {
        document.getElementById('authMessage').textContent = err.message || 'Sign in failed.';
      }
    }
    async function handleGoogleSignIn() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await auth.signInWithPopup(provider);
        hideAuthModal();
      } catch (err) {
        document.getElementById('authMessage').textContent = err.message || 'Google sign in failed.';
      }
    }
    auth.onAuthStateChanged((user) => {
      currentUser = user;
      if (!user) {
        showAuthModal();
        return;
      }
      hideAuthModal();
      loadPosts();
    });
    async function loadPosts() {
      const q = db.collection('community_posts').orderBy('timestamp','desc').limit(20);
      const snap = lastDoc ? await q.startAfter(lastDoc).get() : await q.get();
      if (!snap.empty) {
        lastDoc = snap.docs[snap.docs.length - 1];
      } else {
        hasMore = false;
      }
      const docs = snap.docs;
      if (!lastDoc && docs.length === 0) {
        feedEl.innerHTML = '<div class="empty">No posts yet. Be the first to share a meal.</div>';
        loadMoreBtn.style.display = 'none';
        return;
      }
      docs.forEach(async (doc) => {
        const post = doc.data();
        const card = document.createElement('article');
        card.className = 'post-card';
        const likeRef = db.collection('community_posts').doc(doc.id).collection('likes').doc(currentUser.uid);
        const likeSnap = await likeRef.get();
        const liked = likeSnap.exists;
        card.innerHTML = `
          <div class="post-head">
            <div class="post-user">
              <div class="avatar">${post.photoURL ? `<img src="${post.photoURL}" alt="${post.displayName}">` : (post.displayName || 'K').slice(0,1).toUpperCase()}</div>
              <div><div style="font-weight:600;">${post.displayName || 'Kitchen Member'}</div><div class="post-meta">${formatTime(post.timestamp)}</div></div>
            </div>
            <div class="post-meta">${formatTime(post.timestamp)}</div>
          </div>
          <div class="post-recipe">${post.recipeName}</div>
          <p class="post-caption">${post.userCaption || 'Shared a recipe.'}</p>
          ${post.userPhoto ? `<img class="post-image" src="${post.userPhoto}" alt="${post.recipeName}">` : (post.recipeImage ? `<img class="post-image" src="${post.recipeImage}" alt="${post.recipeName}">` : '')}
          <div class="post-actions">
            <button class="like-btn" data-post-id="${doc.id}" data-liked="${liked}">${liked ? '❤️' : '♡'} ${post.likes || 0}</button>
            <span class="tag">${post.recipeName}</span>
          </div>`;
        feedEl.appendChild(card);
        card.querySelector('.like-btn').addEventListener('click', async () => {
          const ref = db.collection('community_posts').doc(doc.id).collection('likes').doc(currentUser.uid);
          const snap = await ref.get();
          if (snap.exists) {
            await ref.delete();
            await db.collection('community_posts').doc(doc.id).update({ likes: firebase.firestore.FieldValue.increment(-1) });
          } else {
            await ref.set({ createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            await db.collection('community_posts').doc(doc.id).update({ likes: firebase.firestore.FieldValue.increment(1) });
          }
          loadPosts();
        });
      });
      if (hasMore) loadMoreBtn.style.display = 'inline-block'; else loadMoreBtn.style.display = 'none';
    }
    function formatTime(ts) {
      if (!ts) return 'just now';
      const date = ts.toDate ? ts.toDate() : new Date(ts);
      const diff = Math.max(1, Math.round((Date.now() - date.getTime()) / (1000 * 60 * 60)));
      return diff < 24 ? `${diff} hours ago` : `${Math.round(diff / 24)} days ago`;
    }
    loadMoreBtn.addEventListener('click', () => loadPosts());
    document.getElementById('signinBtn').addEventListener('click', handleEmailSignIn);
    document.getElementById('googleSignInBtn').addEventListener('click', handleGoogleSignIn);
  </script>
</body>
</html>
