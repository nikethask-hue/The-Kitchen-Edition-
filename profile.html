<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Kitchen Edition | Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: light; --bg:#f5f2e8; --surface:#fff; --text:#171716; --muted:#66655f; --border:rgba(23,23,22,0.16); }
    @media (prefers-color-scheme: dark){ :root{ color-scheme:dark; --bg:#121212; --surface:#1a1a1a; --text:#f2efe9; --muted:#b6b2a8; --border:rgba(242,239,233,0.16);} }
    *{box-sizing:border-box;} body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);} a{color:inherit;text-decoration:none;} .page{max-width:720px;margin:0 auto;padding:28px 20px 48px;} .back-link{display:inline-block;margin-bottom:18px;font-size:12px;color:var(--muted);} .card{border:0.5px solid var(--border);border-radius:12px;background:var(--surface);padding:24px;} .avatar{width:80px;height:80px;border-radius:50%;background:#e7e5dc;display:grid;place-items:center;overflow:hidden;font-size:24px;font-weight:600;} .avatar img{width:100%;height:100%;object-fit:cover;} .btn{border:none;border-radius:999px;padding:9px 14px;background:#111;color:#fff;font:inherit;cursor:pointer;} .btn.secondary{background:#fff;color:#171716;border:0.5px solid var(--border);} .field{display:grid;gap:8px;margin-top:16px;} input{padding:10px 12px;border:0.5px solid var(--border);border-radius:10px;background:var(--surface);color:inherit;font:inherit;} .muted{font-size:13px;color:var(--muted);} .status{font-size:12px;margin-top:8px;color:var(--muted);} h1{margin:0 0 8px;font-family:'Playfair Display',serif;font-size:28px;font-weight:500;} .row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;} @media (max-width:480px){ .page{padding:18px 14px 36px;} }
  </style>
</head>
<body>
  <div class="page">
    <a class="back-link" href="index.html">← Back to app</a>
    <div class="card">
      <h1>Your profile</h1>
      <div class="row" style="margin-top:14px;">
        <div id="profileAvatar" class="avatar"></div>
        <div>
          <button class="btn secondary" id="changePhotoBtn" type="button">Change photo</button>
          <input type="file" id="photoInput" accept="image/png,image/jpeg,image/webp" style="display:none;" />
          <div class="status" id="uploadStatus">Upload a profile photo to personalize your account.</div>
        </div>
      </div>
      <div class="field">
        <label class="muted" for="displayNameInput">Display name</label>
        <input id="displayNameInput" type="text" />
        <button class="btn" id="saveNameBtn">Save name</button>
      </div>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-storage-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: 'AIzaSyA5xjQkdJdV0x5S0q3gOm2WQ0C0S2u9W4I',
      authDomain: 'the-kitchen-edition-7cb7a.firebaseapp.com',
      projectId: 'the-kitchen-edition-7cb7a',
      storageBucket: 'the-kitchen-edition-7cb7a.firebasestorage.app',
      messagingSenderId: '825295658456',
      appId: '1:825295658456:web:70d2af0ca0f751d0f2b06d8'
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();
    const photoInput = document.getElementById('photoInput');
    const avatar = document.getElementById('profileAvatar');
    const status = document.getElementById('uploadStatus');
    const displayNameInput = document.getElementById('displayNameInput');
    auth.onAuthStateChanged(async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      displayNameInput.value = user.displayName || '';
      renderAvatar(user);
      const snap = await db.collection('users').doc(user.uid).get();
      if (snap.exists) {
        const data = snap.data();
        if (data.displayName) displayNameInput.value = data.displayName;
        renderAvatar({ ...user, photoURL: data.photoURL || user.photoURL });
      }
    });
    document.getElementById('changePhotoBtn').addEventListener('click', () => photoInput.click());
    photoInput.addEventListener('change', async () => {
      const file = photoInput.files[0];
      if (!file) return;
      const user = auth.currentUser;
      if (!user) return;
      status.textContent = 'Uploading...';
      const path = `profile_pictures/${user.uid}/${file.name}`;
      const snap = await storage.ref(path).put(file);
      const url = await snap.ref.getDownloadURL();
      await user.updateProfile({ photoURL: url });
      await db.collection('users').doc(user.uid).set({ photoURL: url, displayName: user.displayName || '', email: user.email || '' }, { merge: true });
      renderAvatar({ ...user, photoURL: url });
      status.textContent = 'Profile photo updated.';
    });
    document.getElementById('saveNameBtn').addEventListener('click', async () => {
      const user = auth.currentUser;
      if (!user) return;
      const name = displayNameInput.value.trim();
      await user.updateProfile({ displayName: name });
      await db.collection('users').doc(user.uid).set({ displayName: name, email: user.email || '', photoURL: user.photoURL || '' }, { merge: true });
      status.textContent = 'Display name updated.';
    });
    function renderAvatar(user) {
      const initials = (user.displayName || user.email || 'K').split(' ').map(part => part[0]).join('').slice(0,2).toUpperCase();
      avatar.innerHTML = user.photoURL ? `<img src="${user.photoURL}" alt="avatar">` : initials;
    }
  </script>
</body>
</html>
